# This needs to be added to the bottom of your Platformio.ini file

[env:simulator]
platform = native
build_flags =
  -std=gnu++2a
  -arch arm64
  -I/opt/homebrew/include
  -L/opt/homebrew/lib
  -lSDL2
  -DSIMULATOR
  -Wno-c++11-narrowing
  -Wno-bidi-chars
  -DCROSSPOINT_VERSION=\"dev-simulator\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
lib_ignore = hal, PNGdec, JPEGDEC
extra_scripts =
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/build_html.py
  scripts/run_simulator.py
lib_deps =
  simulator_mock=https://github.com/uxjulia/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ ^0.0.1
  links2004/WebSockets @ 2.7.3

# X3 simulator: 792×528 landscape buffer (528×792 portrait), 3.7" panel, ~257 ppi.
# Different aspect ratio from X4 (3:2 vs 5:3) — wallpapers must be 528×792, not 480×800.

[env:simulator-x3]
platform = native
build_flags =
  -std=gnu++2a
  -arch arm64
  -I/opt/homebrew/include
  -L/opt/homebrew/lib
  -lSDL2
  -DSIMULATOR
  -DSIMULATOR_DEVICE_X3
  -Wno-c++11-narrowing
  -Wno-bidi-chars
  -DCROSSPOINT_VERSION=\"sim\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
lib_ignore = hal, PNGdec, JPEGDEC
extra_scripts =
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/build_html.py
  scripts/run_simulator.py
lib_deps =
  simulator_mock=https://github.com/uxjulia/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ ^0.0.1
  links2004/WebSockets @ 2.7.3